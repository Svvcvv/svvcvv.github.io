<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全访问验证</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-gray-50 to-blue-50 min-h-screen flex items-center justify-center p-4">
    <div id="loginForm" class="bg-white rounded-2xl shadow-xl p-6 md:p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-4">
                <i class="fa fa-shield text-2xl text-blue-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">安全访问</h1>
            <p class="text-gray-500 mt-2">此内容受密码保护，请输入访问密码</p>
        </div>
        <form id="verifyForm" class="space-y-6">
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">访问密码</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                        <i class="fa fa-lock"></i>
                    </span>
                    <input type="password" id="password" class="w-full pl-10 pr-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="请输入密码" required>
                </div>
            </div>
            <div id="errorMessage" class="hidden p-3 bg-red-50 border border-red-100 rounded-lg text-sm text-red-600">
                <i class="fa fa-exclamation-circle mr-1"></i><span>密码不正确</span>
            </div>
            <div id="loadingIndicator" class="hidden p-3 bg-blue-50 border border-blue-100 rounded-lg text-sm">
                <i class="fa fa-spinner fa-spin mr-1"></i><span>验证并解密中...</span>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg flex items-center justify-center">
                <i class="fa fa-unlock-alt mr-2"></i>验证并访问
            </button>
        </form>
    </div>

    <script>
        // ===================== 在这里粘贴生成的配置 =====================
const config = {
    storedHash: "/YpnqsZVa2XIzGn0yeH8zwGArkjtaWUMdX9lImJhPQ0=",
    storedSalt: "r9UFa1T/Vx9ckeDPQQ7qiw==",
    encryptedContent: "F3vYElzaYfa0cnrGnmo+ossp4JfCMkCzVTUfe40ICRddP/4eDjrky3wesbumr0n0seX6OmdtKGtjTFMofU6lBIhQKFOGKiNJx7m40fBcfnitGY5b+F7LIAAn7r+/LJWLDRrWGneUhoLiZ444cqFfYXYijoJIZaCqq8sHYuu8gl0X9wfotJX1ORg+QjVln4V71u2PLcR+YGwsjrypEsNfBeLidlGF",
    contentIv: "NRahPRLJyaYEDfxN",
    contentType: "text"
};
        // ==============================================================

        const PBKDF2_ITERATIONS = 200000;
        function base64ToArray(base64) { const b = atob(base64); const u = new Uint8Array(b.length); for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i); return u; }

        async function verifyPassword(pwd, hash, salt) {
            const encoder = new TextEncoder();
            const key = await crypto.subtle.importKey("raw", encoder.encode(pwd), {name:"PBKDF2"}, false, ["deriveBits"]);
            const bits = await crypto.subtle.deriveBits({name:"PBKDF2",salt:base64ToArray(salt),iterations:PBKDF2_ITERATIONS,hash:"SHA-256"}, key, 256);
            return btoa(String.fromCharCode(...new Uint8Array(bits))) === hash;
        }

        async function decryptContent() {
            const encoder = new TextEncoder();
            const decoder = new TextDecoder();
            const keyMaterial = await crypto.subtle.importKey("raw", encoder.encode(document.getElementById('password').value), {name:"PBKDF2"}, false, ["deriveKey"]);
            const key = await crypto.subtle.deriveKey({name:"PBKDF2",salt:base64ToArray(config.storedSalt),iterations:PBKDF2_ITERATIONS,hash:"SHA-256"}, keyMaterial, {name:"AES-GCM",length:256}, false, ["decrypt"]);
            const decrypted = await crypto.subtle.decrypt({name:"AES-GCM",iv:base64ToArray(config.contentIv)}, key, base64ToArray(config.encryptedContent));
            return decoder.decode(decrypted);
        }

        function renderContent(content, type) {
            if(type === 'html'){
                document.open();
                document.write(content);
                document.close();
            }else if(type === 'text'){
                document.body.innerHTML = `<pre style="padding:20px;white-space:pre-wrap;word-wrap:break-word;">${content}</pre>`;
            }else if(type === 'url'){
                window.location.href=content;
            }
        }

        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const err = document.getElementById('errorMessage');
            const load = document.getElementById('loadingIndicator');
            const btn = e.submitter;
            err.classList.add('hidden');
            load.classList.remove('hidden');
            btn.disabled = true;

            try {
                const valid = await verifyPassword(document.getElementById('password').value, config.storedHash, config.storedSalt);
                if(valid){
                    const content = await decryptContent();
                    renderContent(content, config.contentType);
                }else{
                    err.classList.remove('hidden');
                }
            } catch (e) {
                console.error(e);
                alert('解密失败：'+e.message);
            } finally {
                load.classList.add('hidden');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
