<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HTML查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #tipBox {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 20px;
            background: #f5f5f5;
        }
        #fileInput {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        /* 嵌入容器铺满全屏，覆盖原有内容 */
        #container {
            width: 100vw;
            height: 100vh;
            display: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- 初始提示界面 -->
    <div id="tipBox">
        <p>请选择本地 .html 文件加载</p>
        <input type="file" id="fileInput" accept=".html,.htm">
    </div>

    <!-- 加载后全屏容器 -->
    <div id="container">
        <iframe id="htmlFrame"></iframe>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const tipBox = document.getElementById('tipBox');
        const container = document.getElementById('container');
        const htmlFrame = document.getElementById('htmlFrame');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 创建本地文件URL
            const fileUrl = URL.createObjectURL(file);
            // iframe加载目标html
            htmlFrame.src = fileUrl;

            // 隐藏初始界面，显示嵌入页面（实现覆盖自身效果）
            tipBox.style.display = 'none';
            container.style.display = 'block';
        });
    </script>
</body>
</html>
