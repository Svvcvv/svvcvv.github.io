    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-4px);
                box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.1);
            }
            .btn-pop {
                transition: all 0.2s ease;
            }
            .btn-pop:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            }
            .control-hover {
                @apply transition-all duration-300 hover:bg-primary/90 hover:scale-105;
            }
            .game-btn {
                @apply transition-all duration-200 hover:scale-105 active:scale-95;
            }
            .click-animation {
                animation: clickEffect 0.3s ease-out;
            }
            @keyframes clickEffect {
                0% { transform: scale(1); }
                50% { transform: scale(0.95); }
                100% { transform: scale(1); }
            }
            .floating-number {
                position: absolute;
                pointer-events: none;
                font-size: 14px;
                font-weight: bold;
                animation: floatUp 1s ease-out forwards;
            }
            @keyframes floatUp {
                0% { opacity: 1; transform: translateY(0); }
                100% { opacity: 0; transform: translateY(-30px); }
            }
            .pulse-animation {
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0% { transform: scale(1); }
                50% { transform: scale(1.05); }
                100% { transform: scale(1); }
            }
        }
    </style>
    <style>
        .mobile-menu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out;
        }
        .mobile-menu.open {
            max-height: 300px;

        /* ========== 强制修复暗色模式所有问题（优先级最高） ========== */
        body.Dark-theme {
            --text: #f2f4f8;
            --muted: rgba(242, 244, 248, 0.7);
            --accent: #f7d47a;
            --card-bg: rgba(16, 20, 30, 0.86);
        }
        /* 主标题变白 */
        body.Dark-theme h1 {
            color: var(--text) !important;
        }
        /* 所有灰色文字变浅 */
        body.Dark-theme .text-neutral-600,
        body.Dark-theme .text-neutral-700,
        body.Dark-theme .text-neutral-500 {
            color: var(--muted) !important;
        }
        /* 文章标签修复 */
        body.Dark-theme span.bg-blue-100 {
            background: rgba(247, 212, 122, 0.2) !important;
            color: var(--accent) !important;
            border: 1px solid rgba(247, 212, 122, 0.3);
        }
        /* 卡片背景 */
        body.Dark-theme .bg-white {
            background: var(--card-bg) !important;
            border-color: rgba(255,255,255,0.1) !important;
        }
        /* 分类按钮暗色适配 */
        body.Dark-theme .category-btn {
            color: var(--text) !important;
        }
        body.Dark-theme .category-btn.bg-neutral-100 {
            background: rgba(255,255,255,0.1) !important;
        }
        body.Dark-theme .category-btn.bg-neutral-100:hover {
            background: rgba(255,255,255,0.15) !important;
        }
        /* 分页按钮修复 */
        body.Dark-theme .page-btn,
        body.Dark-theme #prev-page,
        body.Dark-theme #next-page {
            border-color: rgba(255,255,255,0.2) !important;
            color: var(--text) !important;
        }
        body.Dark-theme .page-btn.bg-primary {
            background: rgba(247, 212, 122, 0.2) !important;
            color: var(--accent) !important;
        }
        /* 链接颜色 */
        body.Dark-theme .text-primary,
        body.Dark-theme .hover:text-primary:hover {
            color: var(--accent) !important;
        }
    </style>
</head>

    <!-- 统一交互脚本：菜单+滚动+暗色模式 -->
    <script>
        const menuToggle = document.getElementById('menuToggle');
        const mobileMenu = document.getElementById('mobileMenu');

        menuToggle.addEventListener('click', () => {
            mobileMenu.classList.toggle('open');
            const icon = menuToggle.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-times');
        });

        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) {
                nav.classList.add('shadow');
                nav.classList.remove('shadow-sm');
            } else {
                nav.classList.remove('shadow');
                nav.classList.add('shadow-sm');
            }
        });

        // 统一暗色模式逻辑
        const themeToggle = document.getElementById('themeToggle');
        const themeToggleMobile = document.getElementById('themeToggleMobile');
        const body = document.body;

        function applyTheme(theme) {
            if (theme === 'Dark') {
                body.classList.add('Dark-theme');
                localStorage.setItem('site-theme', 'Dark');
            } else {
                body.classList.remove('Dark-theme');
                localStorage.setItem('site-theme', 'original');
            }
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = body.classList.contains('Dark-theme') ? 'Dark' : 'original';
            applyTheme(currentTheme === 'Dark' ? 'original' : 'Dark');
        });

        themeToggleMobile.addEventListener('click', () => {
            const currentTheme = body.classList.contains('Dark-theme') ? 'Dark' : 'original';
            applyTheme(currentTheme === 'Dark' ? 'original' : 'Dark');
        });

        // 页面加载自动恢复主题
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('site-theme');
            if (savedTheme === 'Dark') {
                applyTheme('Dark');
            }
        });
    </script>

    <!-- Main Content -->

    <script>
        // 时间显示功能
        function updateTime() {
            const date = new Date();
            document.getElementById("datetime").textContent = date.toLocaleString();
        }
        setInterval(updateTime, 1000);
        window.onload = updateTime;

        // 模拟博客数据
        const blogPosts = [
            {
                title: "论本站名字应该叫什么",
                date: "2025年12月",
                readTime: "3 min read",
                category: "Tech News",
                image: "webs/articals/assets/rty.png",
                excerpt: "寻求好名字ing",
                link: "webs/articals/what-for-name.html"
            },
            {
                title: "语录合集",
                date: "2025年12月",
                readTime: "3 min read",
                category: "Comment",
                image: "webs/articals/assets/yu.png",
                excerpt: "长期更新",
                link: "webs/articals/how-to-make-compliments.html"
            },
            {
                title: "程序包最终纪念版发布",
                date: "2025年11月",
                readTime: "3 min read",
                category: "Tech News",
                image: "webs/articals/assets/p3.png",
                excerpt: "发布程序包最终纪念版，纪念这个曾经辉煌(?)的项目",
                link: "webs/articals/cxb-last-release.html"
            },
            {
                title: "论bug",
                date: "2025年11月",
                readTime: "3 min read",
                category: "Comment",
                image: "webs/articals/assets/error.jpg",
                excerpt: "中二的随笔",
                link: "webs/articals/talk-about-bug.html"
            },
            {
                title: "程序包一周年庆",
                date: "2025年7月",
                readTime: "2 min read",
                category: "Programming",
                image: "assets/img/cxb4.png",
                excerpt: "AI写的，我改的程序包一周年庆祝网页",
                link: "cxb.html"
            },
            {
                title: "RTE维护版",
                date: "2025年9月",
                readTime: "5 min read",
                category: "Tech News",
                image: "webs/articals/assets/p1.png",
                excerpt: "RTE网站更新日志",
                link: "webs/articals/post1.html"
            }
        ];

        // 分页和筛选设置
        const postsPerPage = 4;
        let currentPage = 1;
        let currentCategory = "All";
        let filteredPosts = [...blogPosts];
        let totalPages = Math.ceil(filteredPosts.length / postsPerPage);

        function renderPosts() {
            if (currentCategory !== "All") {
                filteredPosts = blogPosts.filter(post => post.category === currentCategory);
            } else {
                filteredPosts = [...blogPosts];
            }
            
            totalPages = Math.ceil(filteredPosts.length / postsPerPage);
            
            if (currentPage > totalPages && totalPages > 0) {
                currentPage = totalPages;
            }

            const startIndex = (currentPage - 1) * postsPerPage;
            const endIndex = startIndex + postsPerPage;
            const currentPosts = filteredPosts.slice(startIndex, endIndex);
            
            const postsContainer = document.getElementById('posts-container');
            postsContainer.innerHTML = '';
            
            postsContainer.classList.add('opacity-0', 'transition-opacity', 'duration-500');
            
            setTimeout(() => {
                if (currentPosts.length === 0) {
                    postsContainer.innerHTML = `
                        <div class="text-center py-12">
                            <i class="fa fa-search text-4xl text-neutral-300 mb-4"></i>
                            <p class="text-neutral-500">没有找到"${currentCategory}"分类下的文章</p>
                        </div>
                    `;
                } else {
                    currentPosts.forEach(post => {
                        const article = document.createElement('article');
                        article.className = 'flex flex-col md:flex-row gap-6 card-hover p-4 rounded-lg';
                        article.innerHTML = `
                            <div class="md:w-1/3 rounded-lg overflow-hidden">
                                <img src="${post.image}" alt="${post.title}" class="w-full h-48 object-cover">
                            </div>
                            <div class="md:w-2/3">
                                <div class="flex items-center gap-3 text-sm text-neutral-600 mb-2">
                                    <span><i class="fa fa-calendar mr-1"></i> ${post.date}</span>
                                    <span><i class="fa fa-clock mr-1"></i> ${post.readTime}</span>
                                    <span class="bg-blue-100 text-primary px-2 py-1 rounded text-xs">${post.category}</span>
                                </div>
                                <h2 class="text-xl font-bold mb-2 hover:text-primary transition-colors">
                                    <a href="${post.link}">${post.title}</a>
                                </h2>
                                <p class="text-neutral-700 mb-4">${post.excerpt}</p>
                                <a href="${post.link}" class="inline-flex items-center text-primary font-medium btn-pop px-3 py-1 rounded">
                                    Read More <i class="fa fa-arrow-right ml-2"></i>
                                </a>
                            </div>
                        `;
                        postsContainer.appendChild(article);
                    });
                }
                
                postsContainer.classList.remove('opacity-0');
                updatePaginationButtons();
            }, 300);
        }

        function updatePaginationButtons() {
            const paginationContainer = document.getElementById('pagination-container');
            const prevBtn = document.getElementById('prev-page');
            const nextBtn = document.getElementById('next-page');
            
            document.querySelectorAll('.page-btn').forEach(btn => btn.remove());

            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn w-10 h-10 flex items-center justify-center rounded-full transition-colors ${
                    i === currentPage ? 'bg-primary text-white' : 'border border-neutral-200 hover:border-primary hover:text-primary'
                }`;
                pageBtn.dataset.page = i;
                pageBtn.textContent = i;
                
                paginationContainer.insertBefore(pageBtn, nextBtn);

                pageBtn.addEventListener('click', () => {
                    if (parseInt(pageBtn.dataset.page) !== currentPage) {
                        currentPage = parseInt(pageBtn.dataset.page);
                        renderPosts();
                    }
                });
            }

            prevBtn.disabled = currentPage === 1 || totalPages === 0;
            nextBtn.disabled = currentPage === totalPages || totalPages === 0;
            
            prevBtn.classList.toggle('opacity-50', prevBtn.disabled);
            prevBtn.classList.toggle('cursor-not-allowed', prevBtn.disabled);
            nextBtn.classList.toggle('opacity-50', nextBtn.disabled);
            nextBtn.classList.toggle('cursor-not-allowed', nextBtn.disabled);
        }

        function initCategoryFilters() {
            const categoryButtons = document.querySelectorAll('.category-btn');
            
            categoryButtons.forEach(button => {
                button.addEventListener('click', () => {
                    currentCategory = button.dataset.category;
                    location.hash = `#${currentCategory}`;
                    currentPage = 1;
                    
                    categoryButtons.forEach(btn => {
                        if (btn.dataset.category === currentCategory) {
                            btn.classList.remove('bg-neutral-100', 'hover:bg-neutral-200');
                            btn.classList.add('bg-primary', 'text-white');
                        } else {
                            btn.classList.remove('bg-primary', 'text-white');
                            btn.classList.add('bg-neutral-100', 'hover:bg-neutral-200');
                        }
                    });
                    
                    renderPosts();
                });
            });
        }

        function initPagination() {
            document.getElementById('prev-page').addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderPosts();
                }
            });

            document.getElementById('next-page').addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderPosts();
                }
            });
        }

        function handleHashChange() {
            const hash = location.hash.slice(1);
            if (hash) {
                const decodedHash = decodeURIComponent(hash);
                const targetButton = document.querySelector(`.category-btn[data-category="${decodedHash}"]`);
                if (targetButton) targetButton.click();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initCategoryFilters();
            initPagination();
            window.addEventListener('hashchange', handleHashChange);
            
            const initialHash = location.hash.slice(1);
            if (initialHash) {
                const decodedInitialHash = decodeURIComponent(initialHash);
                const targetButton = document.querySelector(`.category-btn[data-category="${decodedInitialHash}"]`);
                if (targetButton) targetButton.click();
                else renderPosts();
            } else {
                renderPosts();
            }
        });
    </script>
</body>
